name: Build and Push to CANFAR Harbor

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override. Defaults to HARBOR_IMAGE_TAG."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required inputs
        env:
          HARBOR_URL: ${{ secrets.HARBOR_URL }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_REPOSITORY: ${{ secrets.HARBOR_REPOSITORY }}
        run: |
          set -euo pipefail
          missing=0
          for k in HARBOR_URL HARBOR_PROJECT HARBOR_USERNAME HARBOR_PASSWORD HARBOR_REPOSITORY; do
            if [ -z "$(printenv "$k")" ]; then
              echo "ERROR: Missing required secret $k" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Normalize image settings
        env:
          HARBOR_URL: ${{ secrets.HARBOR_URL }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_REPOSITORY: ${{ secrets.HARBOR_REPOSITORY }}
          HARBOR_IMAGE_TAG: ${{ secrets.HARBOR_IMAGE_TAG }}
          HARBOR_IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          registry="$(printf '%s' "$HARBOR_URL" | tr -d '\r\n')"
          project="$(printf '%s' "$HARBOR_PROJECT" | tr -d '\r\n')"
          repository="$(printf '%s' "$HARBOR_REPOSITORY" | tr -d '\r\n')"
          tag="$(printf '%s' "${HARBOR_IMAGE_TAG_INPUT:-${HARBOR_IMAGE_TAG:-latest}}" | tr -d '\r\n')"

          registry="${registry#http://}"
          registry="${registry#https://}"
          registry="${registry%%/*}"
          registry="${registry%/}"

          project="${project#/}"
          project="${project%/}"
          repository="${repository#/}"
          repository="${repository%/}"
          sha_tag="sha-${GITHUB_SHA::12}"

          {
            printf 'HARBOR_REGISTRY=%s\n' "$registry"
            printf 'IMAGE_REF=%s\n' "$registry/$project/$repository:$tag"
            printf 'IMAGE_SHA_REF=%s\n' "$registry/$project/$repository:$sha_tag"
            printf 'IMAGE_LATEST_REF=%s\n' "$registry/$project/$repository:latest"
            printf 'DOCKER_CONFIG=%s\n' "$RUNNER_TEMP/docker-config"
          } >> "$GITHUB_ENV"

      - name: Log in to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          username="$(printf '%s' "$HARBOR_USERNAME" | tr -d '\r\n')"
          password="$(printf '%s' "$HARBOR_PASSWORD" | tr -d '\r\n')"
          docker logout "$HARBOR_REGISTRY" >/dev/null 2>&1 || true
          printf '%s' "$password" | docker login "$HARBOR_REGISTRY" -u "$username" --password-stdin

      - name: Build image
        env:
          DOCKER_BUILDKIT: "1"
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail
          docker buildx build \
            --file Dockerfile \
            --cache-from type=gha,scope=canfar-cutout-worker \
            --cache-to type=gha,scope=canfar-cutout-worker,mode=max \
            --load \
            -t "$IMAGE_REF" \
            -t "$IMAGE_SHA_REF" \
            -t canfar-cutout-worker-ci:local \
            .
          docker tag "$IMAGE_REF" "$IMAGE_LATEST_REF"

      - name: Smoke test image
        run: |
          set -euo pipefail
          test "$(docker image inspect "$IMAGE_REF" --format '{{ index .Config.Labels "ca.nrc.cadc.skaha.type" }}')" = "headless"
          workdir="$RUNNER_TEMP/cutout-worker-smoke"
          mkdir -p "$workdir"
          cat > "$workdir/prepare.py" <<'PY'
          import json
          import os
          import numpy as np
          from astropy.io import fits
          from astropy.wcs import WCS

          work = "/work"
          os.makedirs(work, exist_ok=True)
          os.makedirs(f"{work}/job-astropy", exist_ok=True)
          os.makedirs(f"{work}/job-cutout-fits", exist_ok=True)
          os.makedirs(f"{work}/outputs", exist_ok=True)

          def make_header():
              w = WCS(naxis=2)
              w.wcs.crpix = [60.0, 60.0]
              w.wcs.cdelt = [-0.01, 0.01]
              w.wcs.crval = [180.0, 0.0]
              w.wcs.ctype = ["RA---TAN", "DEC--TAN"]
              return w.to_header()

          header2d = make_header()
          fits.PrimaryHDU(
              data=np.arange(120 * 120, dtype=np.float32).reshape(120, 120),
              header=header2d,
          ).writeto(f"{work}/source2d.fits", overwrite=True)

          header3d = make_header()
          header3d["NAXIS"] = 3
          header3d["NAXIS1"] = 120
          header3d["NAXIS2"] = 120
          header3d["NAXIS3"] = 4
          header3d["CTYPE3"] = "FREQ"
          header3d["CUNIT3"] = "Hz"
          header3d["CRPIX3"] = 1.0
          header3d["CRVAL3"] = 1.4e9
          header3d["CDELT3"] = 1.0e6
          fits.PrimaryHDU(
              data=np.arange(4 * 120 * 120, dtype=np.float32).reshape(4, 120, 120),
              header=header3d,
          ).writeto(f"{work}/source3d.fits", overwrite=True)

          def write_job(name):
              payload = {
                  "job_id": name,
                  "job_name": name,
                  "operation": "cutout",
                  "status": "submitting",
                  "phase": "submitting",
                  "message": "Created",
                  "runner": "headless-session",
                  "layer_ids": [],
                  "output_paths": {},
                  "progress_pct": 0.0,
                  "processed_items": 0,
                  "total_items": 1,
                  "completed_bytes": 0,
                  "total_estimated_bytes": 1,
              }
              with open(f"{work}/job-{name}/job.json", "w", encoding="utf-8") as handle:
                  json.dump(payload, handle)

          def write_manifest(name, tool, source, target, layer_mode):
              write_job(name)
              manifest = {
                  "job_id": name,
                  "job_name": name,
                  "operation": "cutout",
                  "cutout_tool": tool,
                  "layer_mode": layer_mode,
                  "job_paths": {
                      "job_json": f"{work}/job-{name}/job.json",
                      "progress_json": f"{work}/job-{name}/progress.json",
                      "log_path": f"{work}/job-{name}/job.log",
                  },
                  "work_items": [
                      {
                          "source_path": source,
                          "target_path": target,
                          "ra_deg": 180.0,
                          "dec_deg": 0.0,
                          "radius_deg": 0.12,
                          "estimate_bytes": 1048576,
                      }
                  ],
              }
              with open(f"{work}/{name}.json", "w", encoding="utf-8") as handle:
                  json.dump(manifest, handle)

          write_manifest(
              "astropy",
              "astropy",
              f"{work}/source3d.fits",
              f"{work}/outputs/astropy.fits",
              "cube3d",
          )
          write_manifest(
              "cutout-fits",
              "cutout-fits",
              f"{work}/source2d.fits",
              f"{work}/outputs/cutout-fits.fits",
              "image2d",
          )
          PY
          cat > "$workdir/verify.py" <<'PY'
          import json
          import os
          from astropy.io import fits

          for name in ("astropy", "cutout-fits"):
              output = f"/work/outputs/{name}.fits"
              assert os.path.isfile(output), output
              with fits.open(output) as hdul:
                  assert hdul[0].data is not None
              with open(f"/work/job-{name}/progress.json", "r", encoding="utf-8") as handle:
                  progress = json.load(handle)
              assert progress.get("status") in {"running", "queued", "completed"}
              assert os.path.isfile(f"/work/job-{name}/job.log")
          PY
          docker run --rm --pull=never -v "$workdir:/work" canfar-cutout-worker-ci:local sh -lc '
            set -eu
            python -m cutout_worker --help
            python /work/prepare.py
            python -m cutout_worker run --manifest /work/astropy.json
            python -m cutout_worker run --manifest /work/cutout-fits.json
            python /work/verify.py
          '

      - name: Push image
        run: |
          set -euo pipefail
          for ref in "$IMAGE_REF" "$IMAGE_SHA_REF" "$IMAGE_LATEST_REF"; do
            echo "Pushing: $ref"
            docker push "$ref"
          done

      - name: Final image reference
        run: echo "Pushed $IMAGE_REF"

      - name: Clean Docker credentials
        if: always()
        run: |
          rm -rf "${DOCKER_CONFIG:-}"
